name: Continuous Integration
on:
  schedule:
    - cron: "0 0 * * 2"
  push:
    branches:
      - main
      - staging
      - trying
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/ci.yml
      - "pyvisa/**"
      - pyproject.toml

jobs:
  formatting:
    name: Check code formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest numpy
      - name: Formatting
        run: |
          ruff format pyvisa --check;
      - name: Linting
        if: always()
        run: |
          ruff check pyvisa;
      - name: typing
        if: always()
        run: |
          mypy pyvisa;
  tests:
    name: Unit tests
    runs-on: ${{ matrix.os }}
    needs:
      - formatting
    if: needs.formatting.result == 'success'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy
      - name: Install project
        run: |
          pip install -e .
      - name: Test with pytest
        run: |
          pip install pytest-cov
          python -X dev -m pytest --pyargs pyvisa --cov --cov-report xml -v
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true

  pyvisa-tester-assisted-ivi-linux:
    name: pyvisa-tester assisted tests (Linux, IVI backend)
    runs-on: ubuntu-latest
    needs:
      - formatting
    if: needs.formatting.result == 'success' && vars.PYVISA_RUN_LXI_SRQ == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest-cov
          pip install -e .

      - name: Install rpcbind and Keysight VISA
        env:
          KEYSIGHT_IO_LIBS_DEB_URL: ${{ vars.KEYSIGHT_IO_LIBS_DEB_URL }}
        run: |
          if [ -z "$KEYSIGHT_IO_LIBS_DEB_URL" ]; then
            echo "Missing KEYSIGHT_IO_LIBS_DEB_URL repository variable"
            exit 1
          fi

          sudo apt-get update
          sudo apt-get install -y rpcbind curl
          sudo service rpcbind start || true

          curl -L "$KEYSIGHT_IO_LIBS_DEB_URL" -o keysight-visa.deb
          sudo apt-get install -y ./keysight-visa.deb || (sudo apt-get -f install -y && sudo apt-get install -y ./keysight-visa.deb)

      - name: Download pyvisa-tester binary
        run: |
          curl -L https://github.com/pyvisa/pyvisa-tester/releases/latest/download/pyvisa-lxi-fake-linux-x86_64.tar.gz -o pyvisa-lxi-fake-linux-x86_64.tar.gz
          mkdir -p .tester
          tar -C .tester -xzf pyvisa-lxi-fake-linux-x86_64.tar.gz
          chmod +x .tester/pyvisa-lxi-fake

      - name: Start fake instruments
        run: |
          mkdir -p .lxi-artifacts
          ./.tester/pyvisa-lxi-fake --env-file .lxi-artifacts/lxi.env --artifacts-dir .lxi-artifacts > .lxi-artifacts/runner.log 2>&1 &
          echo $! > .lxi-artifacts/pid

          for _ in $(seq 1 60); do
            if [ -s .lxi-artifacts/lxi.env ]; then
              break
            fi
            sleep 1
          done

          test -s .lxi-artifacts/lxi.env

      - name: Run assisted tests (IVI backend)
        run: |
          set -a
          . ./.lxi-artifacts/lxi.env
          set +a
          export PYVISA_TESTER_ASSISTED=1
          python -X dev -m pytest tests/pyvisa_tester_assisted_tests -m "pyvisa_tester_assisted and not pyvisa_tester_usb" -v

      - name: Stop fake instruments
        if: always()
        run: |
          if [ -f .lxi-artifacts/pid ]; then
            kill "$(cat .lxi-artifacts/pid)" || true
          fi

      - name: Upload IVI assisted artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyvisa-tester-assisted-ivi-artifacts
          path: .lxi-artifacts

  pyvisa-tester-assisted-py-linux:
    name: pyvisa-tester assisted tests (Linux, @py backend)
    runs-on: ubuntu-latest
    needs:
      - formatting
    if: needs.formatting.result == 'success' && vars.PYVISA_RUN_LXI_SRQ == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest-cov
          pip install -e .
          pip install pyvisa-py
          pip install git+https://github.com/pyvisa/pyvisa-tester.git

      - name: Run assisted USB-enriched tests (@py)
        run: |
          export PYVISA_LIBRARY=@py
          export PYVISA_TESTER_ASSISTED=1
          export PYVISA_TESTER_USB=1
          export PYVISA_TESTER_VXI11=0
          export PYVISA_TESTER_HISLIP=0
          export PYVISA_TESTER_SOCKET=0
          python -X dev -m pytest tests/pyvisa_tester_assisted_tests/test_usb_resources.py tests/pyvisa_tester_assisted_tests/test_api_shared_resources.py -m "pyvisa_tester_assisted" -v

  # Added to summarize the matrix (otherwise we would need to list every single
  # job in bors.toml)
  tests-result:
    name: Tests result
    if: always()
    needs:
      - tests
    runs-on: ubuntu-latest
    steps:
      - name: Mark the job as a success
        if: needs.tests.result == 'success'
        run: exit 0
      - name: Mark the job as a failure
        if: needs.tests.result != 'success'
        run: exit 1
